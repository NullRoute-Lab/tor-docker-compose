name: Weekly Cloud Cache Seeding

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch: # Allow manual triggering

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start MultiTor and Warm Up
        run: |
          # Scale down to 2 instances dynamically ONLY for GitHub Runner to avoid CPU starvation
          export TOR_INSTANCES=2
          echo "TOR_INSTANCES=2" >> $GITHUB_ENV
          docker compose up -d multitor2
          echo "Waiting 180 seconds for Tor circuits to build and warm up..."
          sleep 180
          echo "=== MULTITOR LOGS ==="
          docker logs multitor2 || true

      - name: Start Psiphon and Fetch Cache
        run: |
          # Now that Tor is hot, start Psiphon
          docker compose up -d psiphon2
          echo "Waiting 120 seconds for Psiphon to download the cache..."
          sleep 120
          echo "=== PSIPHON LOGS ==="
          docker logs psiphon2 || true

      - name: Gracefully stop containers
        run: |
          # Stop containers to flush data and release file locks
          docker compose stop

      - name: Seed files
        run: |
          mkdir -p psiphon-seed
          sudo cp -r ./psiphon/ca.psiphon.PsiphonTunnel.tunnel-core ./psiphon-seed/ 2>/dev/null || true
          sudo chown -R runner:docker ./psiphon-seed

      - name: Clean up environment
        run: |
          docker compose down -v

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add psiphon-seed/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: Weekly Cloud Cache Seeding [skip ci]"
            git push origin HEAD
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
